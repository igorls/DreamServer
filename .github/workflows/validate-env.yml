name: Validate .env Schema

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  env-schema:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tier: [0, 1, 2, 3, 4]
    name: "tier-${{ matrix.tier }}-env-validation"
    defaults:
      run:
        working-directory: dream-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Generate .env for tier ${{ matrix.tier }}
        run: |
          cat > .env << 'ENVEOF'
          DREAM_VERSION=2.3.4
          DREAM_MODE=local
          LLM_API_URL=http://llama-server:8080
          GPU_BACKEND=cpu
          LLM_MODEL=test-model
          GGUF_FILE=test-model.gguf
          CTX_SIZE=4096
          MAX_CONTEXT=4096
          N_GPU_LAYERS=0
          LLM_BACKEND=llamacpp
          ANTHROPIC_API_KEY=
          OPENAI_API_KEY=
          TOGETHER_API_KEY=
          LLAMA_SERVER_PORT=8080
          OLLAMA_PORT=11434
          WEBUI_PORT=3000
          DASHBOARD_PORT=3001
          DASHBOARD_API_PORT=3002
          N8N_PORT=5678
          WHISPER_PORT=9000
          TTS_PORT=8880
          QDRANT_PORT=6333
          QDRANT_GRPC_PORT=6334
          EMBEDDINGS_PORT=8090
          LITELLM_PORT=4000
          OPENCLAW_PORT=7860
          SEARXNG_PORT=8888
          COMFYUI_PORT=8188
          TOKEN_SPY_PORT=3005
          OPENCODE_PORT=3003
          SHIELD_PORT=8085
          LANGFUSE_PORT=3006
          WEBUI_SECRET=test-webui-secret-32chars
          N8N_USER=admin
          N8N_PASS=test-n8n-pass
          LITELLM_KEY=sk-test-key
          OPENCLAW_TOKEN=test-openclaw-token
          DASHBOARD_API_KEY=test-dashboard-key
          OPENCODE_SERVER_PASSWORD=test-opencode-pass
          DIFY_SECRET_KEY=test-dify-secret
          LIVEKIT_API_KEY=devkey-test
          LIVEKIT_API_SECRET=devsecret-test
          WHISPER_MODEL=base
          TTS_VOICE=en_US-lessac-medium
          WEBUI_AUTH=true
          ENABLE_WEB_SEARCH=true
          WEB_SEARCH_ENGINE=searxng
          N8N_AUTH=true
          N8N_HOST=localhost
          N8N_WEBHOOK_URL=http://localhost:5678
          TIMEZONE=UTC
          LLAMA_CPU_LIMIT=4.0
          COMPOSE_FILE=docker-compose.base.yml
          LAN_ACCESS=false
          ENABLE_DEVTOOLS=true
          ENVEOF

          # Inject the tier (uses shell variable expansion)
          echo "TIER=${{ matrix.tier }}" >> .env

      - name: Validate .env against schema
        run: |
          bash scripts/validate-env.sh .env .env.schema.json
